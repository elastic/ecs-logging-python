---
version: 2
updates:

  # Maintain dependencies for GitHub Actions (/.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "22:00"
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pre-commit
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '22:00'
    open-pull-requests-limit: 5
    labels:
      - 'changelog:dependencies'
